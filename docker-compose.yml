# Kolkata Air-Quality Lakehouse — Airflow 3 (CeleryExecutor) + MinIO + Spark(local) + Superset
#
# Spark runs in LOCAL mode inside the Airflow worker (pyspark installed from a pre-built
# local wheel to avoid Docker VM OOM during build). The spark_default connection points
# at local[*] — no separate Spark cluster container needed.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    # --- Airflow 3 internal Task Execution API: all components must share these secrets ---
    AIRFLOW__API_AUTH__JWT_SECRET: 'lakehouse-shared-jwt-secret-change-me'
    AIRFLOW__API__SECRET_KEY: 'lakehouse-shared-flask-secret-change-me'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'
    AIRFLOW__CORE__FERNET_KEY: 'DEqlbeBPdQUNB4X7ipDJvWJxlpHQDIGraJC5xmvaigk='
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'True'
    AIRFLOW__SECRETS__BACKENDS: airflow.secrets.environment_variables.EnvironmentVariablesBackend,airflow.secrets.metastore.MetastoreBackend
    # --- Connections injected via env ---
    AIRFLOW_CONN_AWS_DEFAULT: 'aws://admin:password@?endpoint_url=http%3A%2F%2Fminio%3A9000&region_name=us-east-1'
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "local[*]"}'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/data
    - ./spark:/opt/airflow/spark_jobs
    - ./notebooks:/opt/airflow/notebooks
  networks:
    - lakehouse_net

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks:
      - lakehouse_net

  redis:
    image: redis:latest
    container_name: redis_broker
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    networks:
      - lakehouse_net

  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000:9000"  # API Port
      - "9001:9001"  # Console Port
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 5
    mem_limit: 512m
    networks:
      - lakehouse_net

  # One-shot: create the bronze + silver buckets, then exit.
  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 admin password; do echo 'waiting for minio...'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/bronze;
      /usr/bin/mc mb --ignore-existing local/silver;
      echo 'buckets ready';
      "
    networks:
      - lakehouse_net

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command: -c "airflow db migrate && \
                airflow fab-db migrate && \
                airflow users create \
                  --username tosoham \
                  --password admin \
                  --firstname Soham \
                  --lastname Das \
                  --role Admin \
                  --email todrsoham@gmail.com || true"
    restart: on-failure
    mem_limit: 1g

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: api-server
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    mem_limit: 768m

  # Airflow 3 parses DAGs in a standalone process — without this, no DAGs appear.
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow_dag_processor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: dag-processor
    mem_limit: 512m

  # Required for deferrable sensors (S3KeySensor uses deferrable=True).
  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow_triggerer
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: triggerer
    mem_limit: 512m

  # Worker gets 3 g — it runs the actual tasks including the PySpark local job.
  airflow-worker:
    <<: *airflow-common
    container_name: airflow_worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: celery worker
    mem_limit: 3g
    mem_reservation: 1g

  superset:
    image: apache/superset:latest
    container_name: superset_bi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=a_very_secret_key_for_superset
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c "pip install psycopg2-binary &&
               superset db upgrade &&
               superset init &&
               superset fab create-admin --username admin --password admin --firstname Superset --lastname Admin --email admin@superset.com &&
               gunicorn --bind 0.0.0.0:8088 'superset.app:create_app()'"
    mem_limit: 1g
    networks:
      - lakehouse_net

volumes:
  postgres-data:
  minio-data:

networks:
  lakehouse_net:
    driver: bridge
